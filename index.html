<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Baba Is You - Online Demo</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/cj3loader.js" defer></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #111;
            color: #fff;
        }

        #game-container {
            width: 800px;
            height: 600px;
            margin: 20px auto;
            border: 2px solid #555;
            background-color: #000;
        }
    </style>
</head>

<body>
    <h2>Play Baba Is You Demo</h2>

    <div id="game-container"></div>

    <script>
        window.onload = async function () {
            try {
                await cheerpjInit();
                await cheerpjRunJar("/app/baba.jar");
            } catch (error) {
                console.error("Failed to initialize CheerpJ runtime:", error);
            }
        };
    </script>
</body>

</html>
